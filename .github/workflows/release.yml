# ═══════════════════════════════════════════════════════════
#  NWN MDL Viewer — Create GitHub Release
#
#  Runs build.py and publishes a downloadable release with:
#    - nwn_mdl_viewer.html   (standalone single-file version)
#    - nwn-mdl-viewer-src.zip (full source code)
#
#  Triggers:
#    - Push of a version tag:  git tag v1.2.3 && git push --tags
#    - Manual trigger via Actions tab (workflow_dispatch)
# ═══════════════════════════════════════════════════════════

name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0-dev'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run build script
        run: python build.py

      - name: Rename dist file for release
        run: cp dist/index.html dist/nwn_mdl_webviewer.html

      - name: Create source ZIP (excluding dist/)
        run: |
          zip -r dist/nwn-mdl-webviewer-src.zip \
            css/ \
            docs/ \
            js/ \
            lang/ \
            index.html \
            build.py

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "NWN MDL WebViewer ${{ steps.tag.outputs.name }}"
          body: |
            ## NWN MDL WebViewer ${{ steps.tag.outputs.name }}

            ### Downloads
            | File | Description|
            |---|---|
            | `nwn_mdl_webviewer.html` | **Standalone-Version** — Simply open in your browser, no server required |
            | `nwn-mdl-webviewer-src.zip` | Full source code (HTML + CSS + JS + lang/) |

            ### Using the release
            1. Download `nwn_mdl_webviewer.html`
            2. Open in browser (Chrome, Firefox, Edge)
            3. Drag `.mdl` + texture files (`.tga`, `.dds`) into the drop zone.

            ### Supported formats
            - ASCII MDL (decompiled with NWN Explorer or similar.)
            - NWN/Bioware DDS (custom 20-Byte-Header, DXT1/DXT5)
            - TGA (Type 2/10, 16/24/32-bit)
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          files: |
            dist/nwn_mdl_webviewer.html
            dist/nwn-mdl-webviewer-src.zip
